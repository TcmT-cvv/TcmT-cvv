<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management — Nikki Nails Bar &amp; Spa</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    .sidebar { background: #2d1b2e; color: rgba(255,255,255,0.8); padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar .brand { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .sidebar .brand h2 { font-family: var(--font-display); color: #fff; font-size: 1.1rem; }
    .sidebar .brand p { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: rgba(255,255,255,0.7); font-size: 0.875rem; font-weight: 500; transition: all 0.2s; text-decoration: none; }
    .sidebar nav a:hover, .sidebar nav a.active { background: rgba(233,30,140,0.2); color: #fff; border-left: 3px solid var(--primary); }
    .sidebar nav a .nav-icon { font-size: 1.1rem; min-width: 20px; }
    .sidebar .sidebar-footer { padding: 16px 20px; margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
    .sidebar .sidebar-footer a { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
    .admin-content { padding: 0; }
    .admin-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .admin-header h1 { font-family: var(--font-display); font-size: 1.4rem; }
    .admin-body { padding: 28px 32px; }

    .staff-card-admin {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: box-shadow 0.2s;
    }
    .staff-card-admin:hover { box-shadow: var(--shadow-lg); }

    .staff-card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .staff-avatar-lg {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }
    .staff-info h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; }
    .staff-info .role { font-size: 0.82rem; color: var(--text-light); margin-bottom: 6px; }
    .staff-info .specialty { font-size: 0.82rem; color: var(--primary); font-weight: 500; }

    .status-selector { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-btn {
      padding: 5px 14px; border-radius: 16px;
      border: 1.5px solid var(--border); background: var(--white);
      color: var(--text-light); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: var(--font-body); transition: all 0.2s;
    }
    .status-btn:hover { border-color: var(--primary); }
    .status-btn.active-available { background: var(--success-light); color: var(--success); border-color: var(--success); }
    .status-btn.active-busy { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .status-btn.active-break { background: var(--warning-light); color: var(--warning); border-color: var(--warning); }
    .status-btn.active-off { background: #f5f5f5; color: #757575; border-color: #bdbdbd; }

    .staff-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .staff-stat { text-align: center; }
    .staff-stat .val { font-weight: 700; font-size: 1.1rem; color: var(--primary); }
    .staff-stat .lbl { font-size: 0.72rem; color: var(--text-light); margin-top: 2px; }

    .schedule-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    .schedule-row:last-child { border-bottom: none; }
    .schedule-time { font-weight: 700; min-width: 80px; color: var(--primary-dark); }
    .schedule-info { flex: 1; }
    .schedule-info h4 { font-size: 0.875rem; }
    .schedule-info p { font-size: 0.78rem; color: var(--text-light); }

    @media (max-width: 900px) { .admin-layout { grid-template-columns: 1fr; } .sidebar { height: auto; position: static; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <h2>💅 Nikki Nails</h2>
        <p>Staff Portal</p>
      </div>
      <nav>
        <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="appointments.html"><span class="nav-icon">📅</span> Appointments</a>
        <a href="queue.html"><span class="nav-icon">👥</span> Walk-In Queue</a>
        <a href="staff.html" class="active"><span class="nav-icon">💅</span> Staff</a>
      </nav>
      <div class="sidebar-footer"><a href="../index.html">← Customer View</a></div>
    </aside>

    <div class="admin-content">
      <div class="admin-header">
        <h1>💅 Staff Management</h1>
        <div style="display:flex;gap:10px;align-items:center;">
          <span id="avail-count" class="chip">Loading...</span>
          <button class="btn btn-ghost btn-sm" onclick="renderStaff()">🔄 Refresh</button>
        </div>
      </div>

      <div class="admin-body">

        <!-- Staff Grid -->
        <div class="grid grid-3 mb-24" id="staff-grid"></div>

        <!-- Today's Schedule per Technician -->
        <div class="card">
          <div class="section-header mb-20">
            <h2>Today's Schedule by Technician</h2>
          </div>
          <div id="schedule-by-tech"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="../js/store.js"></script>
  <script>
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str || ''));
      return d.innerHTML;
    }

    function formatTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':');
      const hr = parseInt(h);
      return `${hr > 12 ? hr - 12 : hr}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
    }

    function statusBadge(status) {
      const map = { 'confirmed':'badge-confirmed','pending':'badge-pending','in-progress':'badge-progress','completed':'badge-completed','cancelled':'badge-cancelled','no-show':'badge-noshow' };
      return `<span class="badge ${map[status]||'badge-pending'}">${status}</span>`;
    }

    function setStatus(staffId, status) {
      Store.updateStaffStatus(staffId, status);
      renderStaff();
    }

    function renderStaff() {
      const staff = Store.getStaff();
      const today = new Date().toISOString().split('T')[0];
      const todayApts = Store.getAppointmentsByDate(today);
      const activeQueue = Store.getActiveQueue();
      const inProgress = Store.getWalkins().filter(w => w.status === 'in-progress');

      const availCount = staff.filter(s => s.status === 'available').length;
      document.getElementById('avail-count').textContent = `${availCount} of ${staff.length} available`;

      // Staff cards
      const grid = document.getElementById('staff-grid');
      grid.innerHTML = staff.map(s => {
        const myApts = todayApts.filter(a => a.technicianId === s.id && a.status !== 'cancelled');
        const myCompleted = myApts.filter(a => a.status === 'completed').length;
        const myRevenue = myApts.filter(a => a.status === 'completed').reduce((sum, a) => sum + (a.price || 0), 0);
        const myQueue = [...activeQueue, ...inProgress].filter(w => w.technicianId === s.id || w.technicianId === 'any').length;

        const statusBtns = [
          { val: 'available', label: '✅ Available' },
          { val: 'busy', label: '💅 Busy' },
          { val: 'break', label: '☕ Break' },
          { val: 'off', label: '🏠 Off Today' }
        ];

        return `
          <div class="staff-card-admin">
            <div class="staff-card-top">
              <div class="staff-avatar-lg">${s.emoji}</div>
              <div class="staff-info">
                <h3>${escapeHtml(s.name)}</h3>
                <div class="role">${escapeHtml(s.role)}</div>
                <div class="specialty">${escapeHtml(s.specialty)}</div>
              </div>
            </div>

            <div>
              <label style="font-size:0.8rem;font-weight:600;color:var(--text-light);margin-bottom:6px;display:block;">STATUS</label>
              <div class="status-selector">
                ${statusBtns.map(b => `
                  <button class="status-btn ${s.status === b.val ? 'active-' + b.val : ''}"
                          onclick="setStatus('${s.id}','${b.val}')">${b.label}</button>
                `).join('')}
              </div>
            </div>

            <div class="staff-stats">
              <div class="staff-stat"><div class="val">${myApts.length}</div><div class="lbl">Today's Apts</div></div>
              <div class="staff-stat"><div class="val">${myCompleted}</div><div class="lbl">Completed</div></div>
              <div class="staff-stat"><div class="val">$${myRevenue}</div><div class="lbl">Revenue</div></div>
            </div>
          </div>`;
      }).join('');

      // Schedule by technician
      const schedEl = document.getElementById('schedule-by-tech');
      const tabs = document.createElement('div');
      tabs.className = 'tabs';
      const contents = document.createElement('div');

      staff.forEach((s, idx) => {
        const myApts = todayApts.filter(a => a.technicianId === s.id && a.status !== 'cancelled')
          .sort((a, b) => a.time.localeCompare(b.time));

        const tabBtn = document.createElement('button');
        tabBtn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        tabBtn.textContent = `${s.emoji} ${s.name}`;
        tabBtn.onclick = () => {
          document.querySelectorAll('#schedule-by-tech .tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('#schedule-by-tech .tab-content').forEach(c => c.classList.remove('active'));
          tabBtn.classList.add('active');
          contentDiv.classList.add('active');
        };
        tabs.appendChild(tabBtn);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'tab-content' + (idx === 0 ? ' active' : '');

        if (myApts.length === 0) {
          contentDiv.innerHTML = '<div class="empty-state" style="padding:32px;"><div class="empty-icon">📅</div><p>No appointments scheduled today.</p></div>';
        } else {
          contentDiv.innerHTML = myApts.map(a => `
            <div class="schedule-row">
              <div class="schedule-time">${formatTime(a.time)}</div>
              <div class="schedule-info">
                <h4>${escapeHtml(a.customerName)}</h4>
                <p>${escapeHtml(a.service)} · ${a.duration} min · $${a.price}</p>
              </div>
              <div>${statusBadge(a.status)}</div>
            </div>
          `).join('');
        }
        contents.appendChild(contentDiv);
      });

      schedEl.innerHTML = '';
      schedEl.appendChild(tabs);
      schedEl.appendChild(contents);
    }

    Store.seedIfEmpty();
    renderStaff();
    setInterval(renderStaff, 30000);
  </script>
</body>
</html>
